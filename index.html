    <h1>GTM & GA4 Learning Lab</h1>
    <p>Try tracking the elements below:</p>

    <!-- A Button for Click Tracking -->
    <button id="main-cta-button">Click Me!</button>

    <!-- A Link for Outbound Tracking -->
    <br><br>
    <a href="https://www.google.com" id="outbound-link">Go to Google</a>

    <!-- A Simple Form for Form Submission Tracking -->
    <br><br>
    <form id="practice-form">
        <input type="text" placeholder="Enter your name">
        <button type="submit">Submit Form</button>
    </form>

    <script>
        // Custom Data Layer Push for practice
        document.getElementById('main-cta-button').addEventListener('click', function() {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'cta_click',
